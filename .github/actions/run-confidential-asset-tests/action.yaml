name: "Run Confidential Asset tests"
description: |
  Run the Confidential Asset SDK tests against a local testnet from the latest Aptos CLI

# Currently no indexer tests or tests against local testnets from production branches,
# we just use whatever is in the latest CLI.

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-node-pnpm

    # Run package install at root. This sets up the parent vitest config.
    - run: pnpm install --frozen-lockfile
      shell: bash

    # Install the dependencies for the Confidential Asset tests
    - run: cd confidential-asset && pnpm install --frozen-lockfile
      shell: bash

    # Install the Aptos CLI globally so the tests' LocalNode setup (which
    # shells out to `aptos node run-localnet`) can find the binary on PATH.
    - run: pnpm install -g @aptos-labs/aptos-cli
      shell: bash

    # Run the Confidential Asset tests.
    - uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # pin@v3
      name: confidential-asset-pnpm-test
      env:
        # This is important, it ensures that the tempdir we create for cloning the ANS
        # repo and mounting it into the CLI container is created in a location that
        # actually supports mounting. Learn more here: https://stackoverflow.com/a/76523941/3846032.
        TMPDIR: ${{ runner.temp }}
      with:
        max_attempts: 3
        timeout_minutes: 25
        # This runs all the tests, both unit and e2e.
        command: cd confidential-asset && pnpm test

    # Install Playwright browser for browser tests
    - run: cd confidential-asset && pnpm exec playwright install --with-deps chromium
      shell: bash

    # Run the Confidential Asset browser tests (unit tests only, no localnet needed).
    - uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # pin@v3
      name: confidential-asset-browser-test
      with:
        max_attempts: 3
        timeout_minutes: 15
        command: cd confidential-asset && pnpm test:browser

    - name: Print local testnet logs on failure
      shell: bash
      if: failure()
      run: |
        echo "::group::Local testnet logs"
        cat ${{ runner.temp }}/local-testnet-logs.txt
        echo "::endgroup::"
