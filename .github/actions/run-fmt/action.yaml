name: "Verify SDK formatting"
description: |
  Run Biome formatter on the codebase to ensure consistency

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-node-pnpm

    # Verify that the format is correct (biome format without --write checks formatting)
    - run: pnpm install --frozen-lockfile && pnpm _fmt
      shell: bash
