name: "Run SDK Deno Runtime Tests"
description: |
  Run the SDK examples with Deno runtime against local testnet

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-node-pnpm

    # Install Deno
    - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # pin@v2.0.4
      with:
        deno-version: v2.x

    # Run package install. If install fails, it probably means the updated lockfile was
    # not included in the commit.
    - run: pnpm install --frozen-lockfile
      shell: bash
    # Build the SDK for use in the examples
    - run: pnpm build
      shell: bash

    # Run a local testnet in the background.
    - run: pnpm exec aptos node run-local-testnet --force-restart --assume-yes --with-indexer-api --log-to-stdout >& ${{ runner.temp }}/local-testnet-logs.txt &
      shell: bash

    # Wait for the local testnet to be ready by hitting the readiness endpoint.
    - run: |
        for attempt in {1..80}; do
          if curl --fail --silent --show-error --max-time 120 http://127.0.0.1:8070 > /dev/null; then
            exit 0
          fi
          echo "Waiting for local testnet readiness endpoint (attempt ${attempt}/80)"
          sleep 1.5
        done
        exit 1
      shell: bash

    # Run the Deno tests
    - uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # pin@v3
      name: deno-sdk-tests
      env:
        TMPDIR: ${{ runner.temp }}
        APTOS_NETWORK: local
      with:
        max_attempts: 3
        timeout_minutes: 15
        command: |
          cd examples/deno-test
          pnpm install
          deno task test:all

    - name: Print local testnet logs on failure
      shell: bash
      if: failure()
      run: |
        echo "::group::Local testnet logs"
        cat ${{ runner.temp }}/local-testnet-logs.txt
        echo "::endgroup::"
