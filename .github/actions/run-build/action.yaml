name: "Run optimized SDK build"
description: |
    Run build for Browser, Node, and Types

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-node-pnpm

    # Run package install, build, license checks, and tree-shaking verification
    - run: pnpm install --frozen-lockfile && pnpm build && pnpm check-license && pnpm test:tree-shaking
      shell: bash
