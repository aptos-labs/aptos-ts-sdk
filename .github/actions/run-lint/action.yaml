name: "Lint SDK Code"
description: |
  Run Biome linter on the codebase to ensure consistency

runs:
  using: composite
  steps:
    # Install node and pnpm.
    - uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
        registry-url: "https://registry.npmjs.org"
    - uses: pnpm/action-setup@v4

    - name: Install safe-chain
      run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.4.7/install-safe-chain.sh | sh -s -- --ci
      shell: bash

    # Run Biome linter
    - run: pnpm install --frozen-lockfile && pnpm lint
      shell: bash
