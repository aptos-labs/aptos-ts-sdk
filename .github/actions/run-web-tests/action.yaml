name: "Run SDK Browser Tests"
description: |
  Run the SDK tests in a real browser environment using Playwright against local testnet

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-node-pnpm

    # Run package install. If install fails, it probably means the updated lockfile was
    # not included in the commit.
    - run: pnpm install --frozen-lockfile
      shell: bash
    # Build the SDK for use in the examples
    - run: pnpm build
      shell: bash

    # Run a local testnet in the background.
    - run: pnpm exec aptos node run-local-testnet --force-restart --assume-yes --with-indexer-api --log-to-stdout >& ${{ runner.temp }}/local-testnet-logs.txt &
      shell: bash

    # Wait for the local testnet to be ready by hitting the readiness endpoint.
    - run: |
        for _ in {1..80}; do
          if curl --fail --silent --show-error http://127.0.0.1:8070 >/dev/null; then
            exit 0
          fi
          sleep 1.5
        done
        echo "Timed out waiting for local testnet readiness endpoint" >&2
        exit 1
      shell: bash

    # Install web test dependencies and Playwright browsers
    - run: |
        cd examples/web-test
        pnpm install
        pnpm exec playwright install --with-deps chromium
      shell: bash

    # Run the browser tests
    - uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # pin@v3
      name: browser-sdk-tests
      env:
        TMPDIR: ${{ runner.temp }}
        APTOS_NETWORK: local
      with:
        max_attempts: 3
        timeout_minutes: 15
        command: |
          cd examples/web-test
          pnpm test

    - name: Print local testnet logs on failure
      shell: bash
      if: failure()
      run: |
        echo "::group::Local testnet logs"
        cat ${{ runner.temp }}/local-testnet-logs.txt
        echo "::endgroup::"

    - name: Upload Playwright report on failure
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # pin@v4
      if: failure()
      with:
        name: playwright-report
        path: examples/web-test/playwright-report/
        retention-days: 7
