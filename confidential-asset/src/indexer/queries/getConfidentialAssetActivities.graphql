query getConfidentialAssetActivities(
  $where_condition: confidential_asset_activities_bool_exp
  $offset: Int
  $limit: Int
  $order_by: [confidential_asset_activities_order_by!]
) {
  confidential_asset_activities(where: $where_condition, offset: $offset, limit: $limit, order_by: $order_by) {
    transaction_version
    event_index
    event_type
    owner_address
    owner_primary_aptos_name: owner_aptos_names(
      where: { is_active: { _eq: true }, is_primary: { _eq: true } }
      order_by: { last_transaction_version: desc }
      limit: 1
    ) {
      domain
      subdomain
    }
    asset_type
    counterparty_address
    counterparty_primary_aptos_name: counterparty_aptos_names(
      where: { is_active: { _eq: true }, is_primary: { _eq: true } }
      order_by: { last_transaction_version: desc }
      limit: 1
    ) {
      domain
      subdomain
    }
    amount
    event_data
    event_data_version
    block_height
    is_transaction_success
    entry_function_id_str
    transaction_timestamp
  }
}
